name = "waiwai-fit-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# 09:00 JST = 00:00 UTC
[triggers]
crons = ["0 0 * * *"]

[vars]
CORS_ORIGINS = "http://localhost:3001"
SLACK_CHANNEL_ID = ""
GOOGLE_WORKSPACE_DOMAIN = ""
# allowlist。カンマ区切り。空ならローカル開発用に全員許可。
# 本番では wrangler secret put ALLOWED_EMAILS で上書き推奨。
ALLOWED_EMAILS = ""

# secrets (wrangler secret put で投入する):
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY  (Cron専用)
#   SLACK_BOT_TOKEN
#   ANTHROPIC_API_KEY
